{% extends "base.html" %}
{% block title %}Login — URL Shortener{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded-xl p-8 mt-8">
  <h2 class="text-2xl font-bold mb-6 text-gray-900">Log in</h2>

  <div class="flex gap-2 mb-6">
    <button id="tab-password" class="tab-btn flex-1 py-2 rounded-lg bg-indigo-600 text-white font-medium">
      Email & Password
    </button>
    <button id="tab-apikey" class="tab-btn flex-1 py-2 rounded-lg bg-gray-100 text-gray-700 font-medium">
      API Key
    </button>
  </div>

  <form id="login-password-form" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" id="login-email" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" id="login-password" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
      Log in
    </button>
  </form>

  <form id="login-apikey-form" class="space-y-4 hidden">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
      <input type="text" id="login-apikey" placeholder="sk_..." required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 font-mono text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
      Log in with API Key
    </button>
  </form>

  <p id="login-error" class="text-red-600 text-sm mt-4 hidden"></p>

  <p class="text-center text-sm text-gray-500 mt-6">
    No account? <a href="/register" class="text-indigo-600 font-medium">Register</a>
  </p>
</div>
{% endblock %}

{% block scripts %}
<script defer src="/static/js/login.js"></script>
{% endblock %}
