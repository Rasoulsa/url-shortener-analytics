{% extends "base.html" %}
{% block title %}Register — URL Shortener{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white shadow rounded-xl p-8 mt-8">
  <h2 class="text-2xl font-bold mb-6 text-gray-900">Create an account</h2>

  <form id="register-form" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" id="register-email" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" id="register-password" required minlength="8"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
    </div>
    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
      Register
    </button>
  </form>

  <p id="register-error" class="text-red-600 text-sm mt-4 hidden"></p>

  <p class="text-center text-sm text-gray-500 mt-6">
    Already have an account? <a href="/login" class="text-indigo-600 font-medium">Log in</a>
  </p>
</div>
{% endblock %}

{% block scripts %}
<script defer src="/static/js/register.js"></script>
{% endblock %}
