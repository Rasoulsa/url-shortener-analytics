<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Analytics Dashboard{% endblock %} — URL Shortener</title>

  <!-- TailwindCSS (CDN, no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js 4 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Shared dashboard helpers -->
  <script src="/static/js/dashboard.js" defer></script>

  <style>
    /* thin scrollbar for tables */
    .thin-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
    .thin-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  </style>
</head>
<body class="h-full font-sans text-gray-800">

<!-- ── NAV ─────────────────────────────────────────────────────────────────── -->
<nav class="bg-white border-b border-gray-200 px-4 py-3 shadow-sm">
  <div class="max-w-6xl mx-auto flex items-center gap-1 sm:gap-2">

    <!-- Brand -->
    <a href="/"
       class="font-bold text-indigo-600 text-lg tracking-tight mr-3 shrink-0">
      🔗 URL Shortener
    </a>

    <!-- Nav links -->
    <div class="flex items-center gap-0.5 sm:gap-1 flex-wrap">

      <a href="/"
         class="nav-link px-2.5 py-1.5 rounded-lg text-sm font-medium
                text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 transition">
        Home
      </a>

      <a href="/links/create"
         class="nav-link px-2.5 py-1.5 rounded-lg text-sm font-medium
                text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 transition">
        Create
      </a>

      <a href="/links"
         class="nav-link px-2.5 py-1.5 rounded-lg text-sm font-medium
                text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 transition">
        My Links
      </a>

      <a href="/dashboard/"
         class="nav-link px-2.5 py-1.5 rounded-lg text-sm font-medium
                text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 transition">
        Dashboard
      </a>

      <a href="/dashboard/compare"
         class="nav-link px-2.5 py-1.5 rounded-lg text-sm font-medium
                text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 transition">
        Compare
      </a>

    </div>

    <!-- Right side -->
    <div class="ml-auto flex items-center gap-3 shrink-0">

      <!-- API key indicator — filled by dashboard.js _updateKeyIndicator() -->
      <div id="navKeyIndicator"></div>

      <a href="/docs"
         target="_blank"
         class="text-xs text-gray-400 hover:text-gray-600 transition">
        API Docs ↗
      </a>

    </div>
  </div>
</nav>

<!-- ── MAIN ─────────────────────────────────────────────────────────────────── -->
<main class="max-w-6xl mx-auto px-4 py-8">
  {% block content %}{% endblock %}
</main>

<!-- ── FOOTER ───────────────────────────────────────────────────────────────── -->
<footer class="border-t border-gray-100 mt-12 py-6 text-center text-xs text-gray-400">
  URL Shortener &amp; Analytics · v1.0.0 ·
  <a href="/docs" target="_blank" class="hover:text-gray-600 transition">API Docs</a>
</footer>

<!-- ── NAV ACTIVE STATE ──────────────────────────────────────────────────────── -->
<script>
  // Highlight the nav link that matches the current path
  (function () {
    const path = window.location.pathname;
    document.querySelectorAll(".nav-link").forEach(function (a) {
      const href = a.getAttribute("href");
      const isActive =
        href === path ||
        (href !== "/" && path.startsWith(href));
      if (isActive) {
        a.classList.add("text-indigo-600", "bg-indigo-50");
        a.classList.remove("text-gray-600");
      }
    });
  })();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
