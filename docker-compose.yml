# docker-compose.yml — local development stack
# Usage:
#   docker compose up --build        → start everything
#   docker compose up --build api    → start only api (+ its depends_on)
#   docker compose down -v           → stop and remove volumes

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-urlshort}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI app ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env.dev
    environment:
      POSTGRES_HOST: db
      REDIS_URL:     redis://redis:6379/0
    ports:
      - "8001:8000"
    volumes:
      - ./geoip:/data:ro          # GeoLite2 mmdb mount
      - .:/app                    # live-reload in dev (remove in prod)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app:celery_app
      worker
      --loglevel=INFO
      --concurrency=2
      --queues=default,analytics
      --hostname=celery@%h
    env_file:
      - .env.dev
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./geoip:/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.tasks.celery_app:celery_app inspect ping --timeout=5 | grep -q pong"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Alembic migrations (run-once) ───────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: alembic upgrade head
    env_file: .env.dev
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    restart: "no"               # run once, exit cleanly

volumes:
  postgres_data:
  redis_data:
